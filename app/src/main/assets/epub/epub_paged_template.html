<!DOCTYPE html>
<html lang="es">
<head>
    <title>Epub Reader</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
          background: transparent;
          word-wrap: break-word;
          overflow: hidden;
          overflow-wrap: break-word;
          -webkit-text-size-adjust: 100%;
          width: 100%;
          height: 100%;
        }
        #content { display: block; width: 100%; height: 100%; }
    </style>

    <script src="epub/epub_base.js"></script>
    <script>
        let shadowRoot;
        let cachedColumnWidth = null;
        let currentPage = 0;
        let totalPages = 0;

        function initShadow() {

          const host = document.getElementById('content');
          shadowRoot = host.attachShadow({ mode: 'open' });

          const style = document.createElement('style');
          style.textContent = `

            :host{
              display:block;
              width:var(--vw,100vw);
              height:var(--vh,100vh);
              overflow:hidden;
            }

            #pager{
              column-width:var(--vw,100vw);
              column-gap:0;
              column-fill:auto;
              height:var(--vh,100vh);
              overflow:visible;
              padding-top:16px;
              padding-bottom:16px;
              will-change:transform;
            }

            *{box-sizing:border-box;}

            section *{
              margin:0;
              padding:0;
              font-size:revert;
              max-width:100%;
            }

            section{
              break-before:column;
              font-family:Georgia,'Times New Roman',serif;
              font-size:20px;
              line-height:1.75;
              color:#1c1c1e;
              margin-bottom:56px;
              padding:24px 20px 48px;
            }

            section p{margin-bottom:1em;text-indent:1.5em;}
            section p:first-child{text-indent:0;}

            section h1{margin:1.4em 0 .5em;font-size:1.6em;}
            section h2{margin:1.2em 0 .4em;font-size:1.35em;}
            section h3{margin:1em 0 .3em;font-size:1.15em;}
            section h4,section h5,section h6{margin:.8em 0 .2em;}

            section blockquote{
              margin:1em 1.5em;
              padding-left:1em;
              border-left:3px solid #ccc;
            }

            section ul,section ol{
              margin:.8em 0;
              padding-left:2em;
            }

            section li{margin-bottom:.3em;}

            section img{
              height:auto;
              display:block;
              margin:16px auto;
            }

            section a{color:#555;}

            section hr{
              margin:2em 0;
              border:none;
              border-top:1px solid #ddd;
            }

            section pre,section code{
              font-family:monospace;
              font-size:.9em;
            }

            section pre{
              margin:1em 0;
              padding:1em;
              overflow-x:auto;
            }

          `;

          shadowRoot.appendChild(style);

          const pager = document.createElement('div');
          pager.id = 'pager';
          shadowRoot.appendChild(pager);

          function updateSizes(){
            const w = window.innerWidth;
            const h = window.innerHeight;
            shadowRoot.host.style.setProperty('--vw',`${w}px`);
            shadowRoot.host.style.setProperty('--vh',`${h}px`);
          }

          updateSizes();

          window.addEventListener('resize',()=>{
            cachedColumnWidth=null;
            updateSizes();
            calculateTotalPages();
          });

          initSwipeGesture();
        }

        function initSwipeGesture(){
          const host = shadowRoot.host;
          let startX=0;
          let startTime=0;
          let dragging=false;

          const THRESHOLD=0.2;
          const VELOCITY_THRESHOLD=0.3;

          host.addEventListener('touchstart',(e)=>{
            startX=e.touches[0].clientX;
            startTime=Date.now();
            dragging=true;
          },{passive:true});

          host.addEventListener('touchmove',(e)=>{
            if(!dragging) return;

            const pager=shadowRoot.getElementById('pager');
            const colWidth=getRealColumnWidth();

            const deltaX=e.touches[0].clientX-startX;

            if((deltaX>0 && currentPage===0) || (deltaX<0 && currentPage===totalPages-1)) return;

            pager.style.transition='none';
            pager.style.transform=`translateX(${-currentPage*colWidth+deltaX}px)`;

          },{passive:true});

          host.addEventListener('touchend',(e)=>{
            if(!dragging) return;
            dragging=false;

            const pager=shadowRoot.getElementById('pager');
            const colWidth=getRealColumnWidth();

            const deltaX=e.changedTouches[0].clientX-startX;
            const velocity=Math.abs(deltaX)/(Date.now()-startTime);

            const isSwipeLeft  = deltaX<0 && (Math.abs(deltaX)>colWidth*THRESHOLD || velocity>VELOCITY_THRESHOLD);
            const isSwipeRight = deltaX>0 && (Math.abs(deltaX)>colWidth*THRESHOLD || velocity>VELOCITY_THRESHOLD);

            pager.style.transition='transform .3s ease';

            if(isSwipeLeft && currentPage<totalPages-1) goToPage(currentPage+1);
            else if(isSwipeRight && currentPage>0) goToPage(currentPage-1);
            else goToPage(currentPage);

            setTimeout(()=>{pager.style.transition='none';},300);

          },{passive:true});
        }

        async function appendChapters(chaptersJson){
          const chapters=JSON.parse(chaptersJson);
          const pager=shadowRoot.getElementById('pager');

          chapters.forEach(ch => {
            const section=document.createElement('section');
            section.id=ch.id;
            section.innerHTML=decodeB64(ch.html);
            pager.appendChild(section);
          });

          cachedColumnWidth=null;
          await Promise.all([
            waitForImages(shadowRoot),
            document.fonts?.ready || Promise.resolve()
          ]);

          requestAnimationFrame(()=>{
            calculateTotalPages();
            NativeApp.onContentReady();
          });

        }

        function goToPage(page){
          const pager=shadowRoot.getElementById('pager');
          if(!pager) return;

          const newPage=Math.max(0,page);
          const colWidth=getRealColumnWidth();
          pager.style.transform=`translateX(${-newPage*colWidth}px)`;

          if(newPage!==currentPage){
            currentPage=newPage;
            NativeApp.onPageChanged(currentPage+1,totalPages);
          }else{
            currentPage=newPage;
          }
        }

        function navigateToId(id){
          const pager=shadowRoot.getElementById('pager');
          const el=shadowRoot.getElementById(id);

          if(!pager || !el) return;

          const colWidth=getRealColumnWidth();

          let offset=0;
          let node=el;

          while(node && node!==pager){
            offset+=node.offsetLeft;
            node=node.offsetParent;
          }

          const page=Math.floor((offset+colWidth/2)/colWidth);

          goToPage(page);

        }

        function getTotalPages(){
          const pager=shadowRoot.getElementById('pager');
          if(!pager) return 0;

          const savedTransform=pager.style.transform;
          pager.style.transform='none';

          const colWidth=pager.getBoundingClientRect().width;
          const scrollWidth=pager.scrollWidth;
          pager.style.transform=savedTransform;
          cachedColumnWidth=colWidth;

          const EPS=0.5;
          const pages=Math.max(1,Math.ceil((scrollWidth-EPS)/colWidth));

          return pages;
        }

        function calculateTotalPages(){
          totalPages=getTotalPages();
          NativeApp.onPagesCalculated(totalPages);

        }

        function getRealColumnWidth(){
          if(cachedColumnWidth) return cachedColumnWidth;
          const pager=shadowRoot.getElementById('pager');
          const currentTransform=pager.style.transform;
          pager.style.transform='none';

          const width=pager.getBoundingClientRect().width;
          pager.style.transform=currentTransform;

          cachedColumnWidth = width>0
            ? width
            : parseFloat(shadowRoot.host.style.getPropertyValue('--vw'));

          return cachedColumnWidth;
        }

        document.addEventListener('DOMContentLoaded',()=>{
          initShadow();
          setupNavigationHandler(shadowRoot);
        });

    </script>
</head>

<body>
<div id="content"></div>
</body>
</html>
