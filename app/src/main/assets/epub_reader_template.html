<!DOCTYPE html>
<html lang="es">
<head>
  <title>Epub Reader</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 18px;
      line-height: 1.75;
      color: #1c1c1e;
      background: #fafaf8;
      padding: 24px 20px 48px;
      word-wrap: break-word;
      overflow-wrap: break-word;
      -webkit-text-size-adjust: 100%;
    }

    .chapter { margin-bottom: 56px; }

    .chapter-title {
      font-size: 1.25em;
      font-weight: 700;
      margin-bottom: 20px;
      text-align: center;
      color: #333;
    }

    .chapter-body p  { margin-bottom: 1em; text-indent: 1.5em; }
    .chapter-body p:first-child { text-indent: 0; }

    .chapter-body img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 16px auto;
    }

    .chapter-body a { color: #555; }

    #loader {
      text-align: center;
      padding: 32px 0;
      color: #aaa;
      font-style: italic;
      font-size: 0.9em;
    }
  </style>
  <script>
    function decodeB64(b64) {
      const bytes = atob(b64);
      const arr   = new Uint8Array(bytes.length);
      for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
      return new TextDecoder('utf-8').decode(arr);
    }

    function appendChapter(htmlB64) {
      const container = document.getElementById('content');
      const section   = document.createElement('section');
      section.className = 'chapter';
      section.innerHTML =
        '<div class="chapter-body">'  + decodeB64(htmlB64)  + '</div>';
      container.appendChild(section);
    }

    /* Throttled scroll listener – triggers chapter pre-fetch 400 px before end. */
    let ticking = false;
    window.addEventListener('scroll', function () {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(function () {
        const remaining = document.documentElement.scrollHeight
                        - window.scrollY
                        - window.innerHeight;
        if (remaining < 400) NativeApp.onNearBottom();
        ticking = false;
      });
    }, { passive: true });
  </script>
</head>
<body>
  <div id="content"></div>
  <div id="loader">Cargando…</div>
</body>
</html>
