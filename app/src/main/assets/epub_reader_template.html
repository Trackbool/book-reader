<!DOCTYPE html>
<html lang="es">
<head>
  <title>Epub Reader</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: transparent;
      padding: 24px 20px 48px;
      word-wrap: break-word;
      overflow-wrap: break-word;
      -webkit-text-size-adjust: 100%;
    }
    #content { display: block; }
  </style>
  <script>
    let shadowRoot;

    function initShadow() {
      const host = document.getElementById('content');
      shadowRoot = host.attachShadow({ mode: 'open' });

      const style = document.createElement('style');
      style.textContent = `
        :host { display: block; }

        * { box-sizing: border-box; }

        section * {
          margin: 0;
          padding: 0;
          font-size: revert;
          max-width: 100%;
        }

        section {
          font-family: Georgia, 'Times New Roman', serif;
          font-size: 18px;
          line-height: 1.75;
          color: #1c1c1e;
          margin-bottom: 56px;
        }

        p               { margin-bottom: 1em; text-indent: 1.5em; }
        p:first-child   { text-indent: 0; }
        h1, h2, h3      { margin: 1.2em 0 0.4em; }
        blockquote      { margin: 1em 1.5em; }
        img             { height: auto; display: block; margin: 16px auto; }
      `;
      shadowRoot.appendChild(style);
    }

    function decodeB64(b64) {
      const bytes = atob(b64);
      const arr   = new Uint8Array(bytes.length);
      for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
      return new TextDecoder('utf-8').decode(arr);
    }

    function appendChapter(htmlB64) {
      const section = document.createElement('section');
      section.innerHTML = decodeB64(htmlB64);
      shadowRoot.appendChild(section);
    }

    document.addEventListener('DOMContentLoaded', initShadow);
  </script>
</head>
<body>
<div id="content"></div>
</body>
</html>
